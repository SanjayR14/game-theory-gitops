apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-theory-backend
  namespace: game-theory
spec:
  replicas: 2

  selector:
    matchLabels:
      app: game-theory-backend

  template:
    metadata:
      labels:
        app: game-theory-backend

    spec:
      containers:
      - name: game-theory-backend

        image: sanjuhu/game-theory-backend:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
